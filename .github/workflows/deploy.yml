name: Deploy

on:
  push:
    branches:
      - stage/dev
      - stage/test
      - stage/prod

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }}
    runs-on: ubuntu-latest
    environment: ${{
      github.ref_name == 'stage/prod' && 'prod'
      || github.ref_name == 'stage/test' && 'test'
      || 'dev'
      }}
    env:
      STAGE: ${{
        github.ref_name == 'stage/prod' && 'prod'
        || github.ref_name == 'stage/test' && 'test'
        || 'dev'
        }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Cache Bun install dir
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-

      # See docs/plan.md — cold install is ~6-8 min due to @pulumi/aws.
      # Tighten back to 5 min once Pulumi moves out of root workspace.
      - name: Install dependencies
        run: bun install --frozen-lockfile --verbose
        timeout-minutes: 15

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy
        run: bun sst deploy --stage $STAGE --print-logs

      - name: Smoke tests
        run: STAGE=$STAGE bun run test:e2e -- --filter=smoke || true
        # Non-blocking for now; tighten once s-tests journeys are in place.
