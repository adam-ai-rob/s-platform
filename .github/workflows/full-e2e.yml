name: Full E2E Tests

# On-demand run of the full `auth.journey.test.ts` against dev, test,
# or prod. Manual trigger only — there is intentionally no cron. Wire
# in automated triggers (e.g. post-deploy for stage/prod, or release
# tagging) in a follow-up when we decide the journey is stable enough
# to block on.
#
# Against a running custom-domain stage, the full 12-test journey
# takes ~4s when Lambdas are warm. Cold starts on a stage that
# hasn't had traffic in a while can push the first register over
# the journey's 15s `eventually()` window — re-run if that happens,
# or hit `/authn/health` on the target stage a few seconds before
# dispatching.
#
# Locally: `STAGE=<stage> bun run test:e2e` (uses the same stage URL
# resolver) — see packages/s-tests/CLAUDE.md.

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Stage to run the full auth journey against"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  contents: read

jobs:
  e2e:
    name: Run auth journey (${{ inputs.stage }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      STAGE: ${{ inputs.stage }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile
        timeout-minutes: 5
      - name: Run full auth journey
        # No `|| true` — the whole point of this manual run is to see
        # pass/fail. STAGE env triggers the packages/s-tests stage URL
        # resolver (dev → https://dev.s-api.smartiqi.com, test →
        # https://test.s-api.smartiqi.com, prod →
        # https://s-api.smartiqi.com).
        run: STAGE=$STAGE bun run test:e2e
