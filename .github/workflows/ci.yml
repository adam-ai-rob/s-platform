name: CI

on:
  pull_request:
    branches: [main, stage/dev, stage/test, stage/prod]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install JDK (for dynamodb-local)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Bun install dir
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-

      # Cold install can be ~6-8 min because @pulumi/aws (61 MB, 2578 .d.ts
      # files) is extracted and hardlinked on every fresh runner. --verbose
      # is kept on so a future regression shows up in logs as a stuck line
      # rather than silent-hang-then-timeout.
      # TODO: when the platform/module SST split lands (docs/plan.md Phase 3),
      # move @pulumi/aws + @pulumi/pulumi out of root into the platform/
      # workspace so the test lane doesn't install them — then tighten back
      # to 5 min and drop --verbose.
      - name: Install dependencies
        run: bun install --frozen-lockfile --verbose
        timeout-minutes: 15

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint:check

      - name: Unit tests
        run: bun run test

      - name: Integration tests
        run: bun run test:integration
        timeout-minutes: 5

      - name: Contract tests
        run: bun run test:contract
        timeout-minutes: 5

      - name: Contracts in sync
        # Regenerate contracts and fail if they differ from the committed
        # artifacts — forces developers to run `bun run contracts:build`
        # whenever they change an event catalog or route. Biome's JSON
        # formatter compacts short arrays, so apply it to the fresh
        # output before diffing (matching what developers get locally
        # when they run `bun run lint`).
        run: |
          bun run contracts:build
          bunx --bun biome format --write \
            packages/s-authn/contracts \
            packages/s-authz/contracts \
            packages/s-user/contracts \
            packages/s-group/contracts
          if ! git diff --quiet -- packages/*/contracts/; then
            echo "Contracts are stale. Run 'bun run contracts:build && bun run lint' and commit the result."
            git --no-pager diff -- packages/*/contracts/
            exit 1
          fi
        timeout-minutes: 3
