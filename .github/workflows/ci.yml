name: CI

on:
  pull_request:
    branches: [main, stage/dev, stage/test, stage/prod]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install JDK (for dynamodb-local)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Bun install dir
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules/.bun
          key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-

      # Cold install is ~5-6 min because @pulumi/aws (~61 MB, 2578 .d.ts files)
      # has to extract and hardlink on a fresh runner. After the first run
      # populates the cache, subsequent runs finish in <30s — well inside 5 min.
      # TODO: when the platform/module SST split lands (docs/plan.md Phase 3),
      # move @pulumi/aws + @pulumi/pulumi into a dedicated infra workspace so
      # the test lane never installs them, and tighten this back to 5 min.
      - name: Install dependencies
        run: bun install --frozen-lockfile
        timeout-minutes: 10

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint:check

      - name: Unit tests
        run: bun run test

      - name: Integration tests
        run: bun run test:integration
        timeout-minutes: 5
