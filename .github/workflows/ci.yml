name: CI

on:
  pull_request:
    branches: [main, stage/dev, stage/test, stage/prod]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install JDK (for dynamodb-local)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Bun install dir
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        timeout-minutes: 5

      # Pre-download + verify DynamoDB Local JAR before integration tests.
      # The `dynamodb-local` npm package pulls from the AWS "latest"
      # tarball on first use and occasionally caches a corrupt / partial
      # JAR (observed: `zip END header not found`,
      # `NoClassDefFoundError: DynamoDbExpressionParser`,
      # `NoClassDefFoundError: org/eclipse/jetty/.../LifeCycle`).
      # Retrying the tarball + validating the JAR class table up-front
      # gives us a clean failure at install time instead of a mid-test
      # flake, and falls back to a known-good release URL when `latest`
      # is broken.
      - name: Pre-download DynamoDB Local JAR (guards against flaky upstream)
        run: |
          set -euo pipefail
          DEST="${TMPDIR:-/tmp}/dynamodb-local"
          mkdir -p "$DEST"
          LATEST_URL="https://s3-us-west-2.amazonaws.com/dynamodb-local/dynamodb_local_latest.tar.gz"
          FALLBACK_URL="https://s3.us-west-2.amazonaws.com/dynamodb-local/dynamodb_local_2024-04-24.tar.gz"

          download_and_verify() {
            local url="$1"
            local tmp
            tmp=$(mktemp -d)
            echo "Downloading $url"
            for attempt in 1 2 3; do
              if curl -fsSL --retry 3 --retry-delay 2 -o "$tmp/ddb.tgz" "$url" \
                  && tar -tzf "$tmp/ddb.tgz" >/dev/null 2>&1; then
                echo "Tarball OK (attempt $attempt)"
                tar -xzf "$tmp/ddb.tgz" -C "$DEST"
                if [ -f "$DEST/DynamoDBLocal.jar" ] \
                    && unzip -l "$DEST/DynamoDBLocal.jar" >/dev/null 2>&1; then
                  echo "JAR structure OK"
                  return 0
                fi
                echo "JAR failed integrity check"
              else
                echo "Tarball download/validation failed (attempt $attempt)"
              fi
              sleep $((attempt * 2))
            done
            return 1
          }

          if ! download_and_verify "$LATEST_URL"; then
            echo "::warning::Falling back to pinned DynamoDB Local release"
            rm -rf "$DEST"
            mkdir -p "$DEST"
            download_and_verify "$FALLBACK_URL"
          fi
        timeout-minutes: 3

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint:check

      - name: Unit tests
        run: bun run test

      - name: Integration tests
        run: bun run test:integration
        timeout-minutes: 5

      - name: Contract tests
        run: bun run test:contract
        timeout-minutes: 5

      - name: Contracts in sync
        # Regenerate contracts and fail if they differ from the committed
        # artifacts — forces developers to run `bun run contracts:build`
        # whenever they change an event catalog or route. Biome's JSON
        # formatter compacts short arrays, so apply it to the fresh
        # output before diffing (matching what developers get locally
        # when they run `bun run lint`).
        run: |
          bun run contracts:build
          bunx --bun biome format --write \
            packages/s-authn/contracts \
            packages/s-authz/contracts \
            packages/s-user/contracts \
            packages/s-group/contracts
          if ! git diff --quiet -- packages/*/contracts/; then
            echo "Contracts are stale. Run 'bun run contracts:build && bun run lint' and commit the result."
            git --no-pager diff -- packages/*/contracts/
            exit 1
          fi
        timeout-minutes: 3

      - name: Contract backwards-compatibility
        # Fail the PR if any module's OpenAPI or AsyncAPI contract
        # removes an endpoint / event / required field, narrows a type,
        # or removes an enum value — all of these break existing
        # consumers. Additive changes (new endpoint, new optional field,
        # widened enum) pass.
        #
        # An intentional breaking change is allowed when the PR carries
        # the `breaking-api-change` label. The label MUST be paired with
        # a migration plan in the PR description (see CLAUDE.md).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          if gh pr view "${{ github.event.pull_request.number }}" \
               --json labels --jq '.labels[].name' 2>/dev/null \
               | grep -qx 'breaking-api-change'; then
            export CONTRACT_DIFF_ALLOW_BREAKING=1
            echo "PR carries 'breaking-api-change' label — breaking changes permitted."
          fi
          bun run scripts/contract-diff.ts
        timeout-minutes: 2
